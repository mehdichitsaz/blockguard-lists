name: Update Blocklists

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run list updater
        run: python3 scripts/update_lists.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet lists/ manifest.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "BlockGuard Bot"
          git config user.email "bot@blockguard.app"

          DOMAIN_COUNT=$(wc -l < lists/unified-domains.txt | tr -d ' ')

          git add lists/ manifest.json
          git commit -m "Update blocklists: ${DOMAIN_COUNT} domains ($(date -u '+%Y-%m-%d %H:%M UTC'))"
          git push
